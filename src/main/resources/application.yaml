spring:
  application:
    name: jpa-project
  datasource:
    url: jdbc:postgresql://localhost:5432/gym
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
